version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      python-minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/tests-e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      javascript-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      javascript-minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      actions-minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
