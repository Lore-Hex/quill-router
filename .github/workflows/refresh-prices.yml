# Hourly upstream-price refresh.
#
# Pulls each keyed provider's published prices, runs a self-healing
# parser layer (LLM-rewrites the parser when validation fails), and
# auto-commits the resulting snapshot to main. Existing deploy.yml
# triggers on the snapshot path via its `src/**` filter — staged
# regional rollout + per-region watchdog already guard the deploy.
#
# Trust shape:
#   * Network IO and URL choice live in scripts/pricing/providers/
#     (human-only). The LLM-rewriteable parser tier is a pure
#     `parse(html: str) -> dict` function with no network/filesystem
#     access; an AST whitelist + sandbox subprocess gate every
#     LLM-generated parser before it's persisted to disk.
#   * The runtime (TR control plane / enclave) does NOT call any
#     pricing endpoint. It reads prices from the committed snapshot
#     at startup. If every upstream is down for an hour, last hour's
#     prices stay live.

name: Refresh upstream prices

on:
  schedule:
    # Top of every hour, UTC.
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Belt-and-suspenders: cron once-per-hour scheduling already prevents
# overlap, but if a manual run kicks off mid-cron-fire, this serializes.
concurrency:
  group: refresh-prices
  cancel-in-progress: false

permissions:
  id-token: write   # for Workload Identity Federation
  contents: write   # auto-commit + push the snapshot diff to main
  actions: write    # dispatch deploy.yml when we land a new snapshot
                    # (GITHUB_TOKEN-pushed commits don't auto-trigger
                    # downstream workflows, so we explicitly fan out
                    # via workflow_dispatch — the one exception to
                    # GHA's loop-prevention rule).

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # The smartest model available via TR's own API, used by the
      # self-heal flow to rewrite a broken parser. Override per env if
      # needed.
      TR_SELF_HEAL_MODEL: anthropic/claude-opus-4.7
      # Inference API (NOT the trustedrouter.com marketing/control-plane
      # domain). TLS terminates inside the attested enclave; this is
      # what /v1/chat/completions calls reach.
      TR_API_BASE: https://api.trustedrouter.com
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the auto-commit can push.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Authenticate to GCP via WIF
        # Same WIF setup as deploy.yml — short-lived OIDC token from
        # GitHub exchanged for an impersonation token on tr-deploy@.
        # tr-deploy@ has been granted accessor on ONLY the
        # trustedrouter-tr-api-key-for-self-heal secret (per-secret IAM
        # binding in scripts/deploy/secrets.sh), so this workflow
        # cannot read any other TR secret.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pull self-heal API key from Secret Manager
        # Pull at workflow runtime instead of baking into a GHA secret.
        # Same source-of-truth as the rest of TR: ~/.quill_cloud_keys.private
        # → scripts/deploy/secrets.sh → GCP Secret Manager. To rotate
        # the key, update the local file and run secrets.sh — the next
        # hourly refresh picks up the new value automatically.
        # The `add-mask` line ensures any accidental echoing of the
        # value in subsequent steps is redacted in workflow logs.
        run: |
          set -euo pipefail
          KEY=$(gcloud secrets versions access latest \
            --secret=trustedrouter-tr-api-key-for-self-heal \
            --project=quill-cloud-proxy)
          echo "::add-mask::${KEY}"
          echo "TR_API_KEY=${KEY}" >> "$GITHUB_ENV"

      - name: Pull TOGETHER_API_KEY from Secret Manager
        # Together's /v1/models requires Bearer auth. Without this,
        # together's adapter fails with 401 and the kimi+together /
        # llama+together failover endpoints drop from the snapshot.
        # tr-deploy@ has per-secret accessor on this one secret only.
        run: |
          set -euo pipefail
          KEY=$(gcloud secrets versions access latest \
            --secret=trustedrouter-together-api-key \
            --project=quill-cloud-proxy)
          echo "::add-mask::${KEY}"
          echo "TOGETHER_API_KEY=${KEY}" >> "$GITHUB_ENV"

      - name: Pull PARASAIL_API_KEY / LIGHTNING_API_KEY / GMI_API_KEY / PHALA_CONFIDENTIAL_API_KEY
        # Same /v1/models-Bearer-auth pattern as Together. Each
        # provider's /v1/models call needs the right key; without
        # them the respective adapter returns 401 and the new
        # gemma-4 endpoints drop from the snapshot. Each scraper
        # tolerates a missing key (counts as one failure under
        # MAX_TOLERATED_FAILURES), but the hourly bot should always
        # have them — same per-secret IAM pattern.
        # PHALA_CONFIDENTIAL_API_KEY hits Phala's GPU-TEE-attested
        # confidential tier (cloud.phala.com dashboard issues this
        # key, distinct from the upstream redpill key); the scraper
        # at phala.py reads /v1/models from api.redpill.ai with it.
        run: |
          set -euo pipefail
          for pair in PARASAIL_API_KEY:trustedrouter-parasail-api-key \
                      LIGHTNING_API_KEY:trustedrouter-lightning-api-key \
                      GMI_API_KEY:trustedrouter-gmi-api-key \
                      DEEPINFRA_API_KEY:trustedrouter-deepinfra-api-key \
                      PHALA_CONFIDENTIAL_API_KEY:trustedrouter-phala-confidential-api-key \
                      CEREBRAS_API_KEY:trustedrouter-cerebras-api-key \
                      KIMI_API_KEY:trustedrouter-kimi-api-key \
                      FIREWORKS_API_KEY:trustedrouter-fireworks-api-key \
                      GEMINI_API_KEY:trustedrouter-gemini-api-key \
                      NOVITA_API_KEY:trustedrouter-novita-api-key \
                      NEBIUS_API_KEY:trustedrouter-nebius-api-key \
                      MINIMAX_API_KEY:trustedrouter-minimax-api-key \
                      CRUSOE_API_KEY:trustedrouter-crusoe-api-key \
                      FRIENDLI_API_KEY:trustedrouter-friendli-api-key \
                      BASETEN_API_KEY:trustedrouter-baseten-api-key \
                      WAFER_API_KEY:trustedrouter-wafer-api-key \
                      ALIBABA_API_KEY:trustedrouter-alibaba-api-key \
                      MAKORA_API_KEY:trustedrouter-makora-api-key; do
            env="${pair%%:*}"
            secret="${pair#*:}"
            KEY=$(gcloud secrets versions access latest --secret="${secret}" --project=quill-cloud-proxy)
            echo "::add-mask::${KEY}"
            echo "${env}=${KEY}" >> "$GITHUB_ENV"
          done

      - name: Snapshot existing pricing file
        run: cp src/trusted_router/data/openrouter_snapshot.json /tmp/before.json

      - name: Refresh provider-direct prices (with self-heal)
        # `set -o pipefail` so the script's exit code propagates through
        # the `| tee` and an exit-1 from refresh.py (too many providers
        # failed entirely) actually fails the step. Without pipefail
        # the pipe exit code is `tee`'s, which is 0 even when the
        # script returned non-zero.
        run: |
          set -o pipefail
          uv run python -m scripts.pricing.refresh | tee /tmp/refresh-summary.txt

      - name: Sanity-check for price spikes + record deltas
        run: |
          set +e
          uv run python scripts/check_price_spike.py \
            /tmp/before.json src/trusted_router/data/openrouter_snapshot.json \
            --summary | tee /tmp/spike-summary.txt
          rc=${PIPESTATUS[0]}
          # Surface the actual per-model deltas in the Actions run summary so
          # ANY price change is visible at a glance (not just buried in the
          # snapshot diff). Still gates: exits 1 on a literal-2x spike or
          # both-prices-to-zero.
          {
            echo "### Price changes this run"
            echo '```'
            cat /tmp/spike-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Price-source coverage audit
        # General stale-price gaps stay visibility-only, but provider docs that
        # announce a model we do not publish are a hard failure. That catches
        # releases like GLM-5.2 when docs update before pricing/OpenRouter does.
        if: always()
        run: |
          set -o pipefail
          uv run python scripts/check_price_coverage.py --strict-model-discovery \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "trustedrouter-pricing-bot"
          git config user.email "noreply@trustedrouter.com"

          # Stage the snapshot AND any self-healed parser modules.
          git add \
            src/trusted_router/data/openrouter_snapshot.json \
            src/trusted_router/data/provider_models/ \
            scripts/pricing/parsers/

          if git diff --cached --quiet; then
            echo "No price changes this hour — nothing to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%MZ")

          # Record the full per-model price deltas in the commit body (not
          # just a count) so a `git show` of any refresh commit answers
          # "what changed?" precisely.
          {
            echo "[bot] hourly price refresh: ${TIMESTAMP}"
            echo ""
            echo "Price changes:"
            cat /tmp/spike-summary.txt 2>/dev/null || echo "(summary unavailable)"
            echo ""
            cat /tmp/refresh-summary.txt
          } > /tmp/commit-msg.txt

          git commit -F /tmp/commit-msg.txt

          # Push with retry. A parallel bot run, a human commit, or the
          # release-digest bot can land on main between our checkout and push
          # (non-fast-forward). Rebase our freshly-computed snapshot on top and
          # retry instead of failing the run. A genuine snapshot↔snapshot
          # rebase conflict is a CLEAN skip — the next hourly run recomputes
          # from live prices and recommits (self-healing). Fixes the recurring
          # "failed to push some refs" races.
          pushed=""
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "push rejected (attempt ${attempt}); rebasing onto origin/main"
            git fetch -q origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::warning::price-refresh: snapshot rebase conflict — skipping; next hourly run recovers"
              exit 0
            fi
          done
          if [ -z "${pushed}" ]; then
            echo "push still failing after retries"
            exit 1
          fi

          # Bot-pushed commits don't auto-trigger downstream workflows
          # (GHA loop prevention applies to the `push` event when the
          # token is GITHUB_TOKEN). `workflow_dispatch` is the only
          # exception — explicitly fan out so the catalog snapshot we
          # just landed actually rolls to prod within ~20 min instead
          # of waiting for the next manual operator dispatch.
          # Discovered live on 2026-05-13: hourly bot was committing
          # but TR's deployed catalog was stuck on a 3-phala-endpoint
          # snapshot for hours because deploy.yml never auto-fired.
          gh workflow run deploy.yml --ref main --repo "${GITHUB_REPOSITORY}" \
            && echo "  dispatched deploy.yml for new snapshot" \
            || echo "  WARN: failed to dispatch deploy.yml; operator can dispatch manually"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
