# Auto-deploy the TrustedRouter control plane to Cloud Run on push to main.
#
# Trust posture: this is the *control plane* — billing, metadata, routing.
# It is NOT the attested-enclave trust boundary; that's the separate
# `deploy-enclave-gcp.yml` workflow in the quill-cloud-proxy repo.
# Failures here surface as "site is down" or "API key expired"; they do
# not affect prompt confidentiality, which the enclave guarantees.
#
# Auth: Workload Identity Federation. No JSON keys in GitHub Secrets.
# A short-lived OIDC token from GitHub is exchanged for an
# impersonation token on tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com,
# scoped to this repo + main branch only.
#
# Trigger: deploys ONLY when files that affect the running service change.
# Docs / README / unrelated config edits do not trigger a rollout.
#
# CI gate: the first step blocks until ci.yml concludes SUCCESS for the
# same SHA. Push-to-main fires ci.yml and deploy.yml in parallel; without
# the gate a red commit could finish rolling out to every region while
# its tests were still failing. workflow_dispatch hotfix=true skips the
# gate (same rationale as skipping the synthetic watchdog).

name: Deploy TR control plane

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/deploy/**"
      - "frontend/src/**"
      - "Dockerfile"
      - ".gcloudignore"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      hotfix:
        description: "Skip synthetic-watchdog + CI-green gating (ship aggressively when prod is sick)"
        type: boolean
        default: false
      deploy_synthetic_monitor:
        description: "Force redeploy synthetic monitor jobs"
        type: boolean
        default: false

# Only one deploy at a time. Two pushes within seconds of each other
# serialize instead of racing to be the running revision.
concurrency:
  group: deploy-trusted-router
  cancel-in-progress: false

permissions:
  id-token: write   # for Workload Identity Federation
  contents: read
  actions: read     # for the CI-green gate (gh run list)

jobs:
  gate-on-ci:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Gate on CI green (same commit)
        # ci.yml and deploy.yml both trigger on push to main and used to
        # race: a bad merge could finish rolling out to every region while
        # CI was still failing on the very same SHA (main carried three
        # latent CI failures this way in early June). This serializes them
        # WITHOUT giving up the paths: filter above — a workflow_run
        # trigger would fire on docs-only pushes too. Polls the ci.yml run
        # for $GITHUB_SHA; refuses to deploy unless it concluded success.
        run: |
          set -euo pipefail
          if [ "${{ inputs.hotfix }}" = "true" ]; then
            echo "::warning::HOTFIX MODE — skipping the CI-green gate."
            exit 0
          fi
          echo "waiting for CI (ci.yml) on ${GITHUB_SHA}"
          deadline=$(( $(date +%s) + 2700 ))   # 45 min, far above CI's normal ~15
          while true; do
            run_json=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow ci.yml \
              --commit "${GITHUB_SHA}" \
              --json databaseId,status,conclusion \
              --jq '.[0]' || true)
            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              status=$(jq -r '.status' <<<"${run_json}")
              conclusion=$(jq -r '.conclusion' <<<"${run_json}")
              echo "  ci run $(jq -r '.databaseId' <<<"${run_json}"): status=${status} conclusion=${conclusion:-<pending>}"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "CI is green — proceeding with the rollout."
                  exit 0
                fi
                echo "CI concluded '${conclusion}' for ${GITHUB_SHA} — refusing to deploy a red commit."
                echo "Fix main, or use workflow_dispatch hotfix=true for emergencies."
                exit 1
              fi
            else
              echo "  no CI run found yet for ${GITHUB_SHA} (queueing?)"
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "timed out after 45 min waiting for CI on ${GITHUB_SHA}"
              exit 1
            fi
            sleep 20
          done

  build-image:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.set-vars.outputs.sha }}
      image: ${{ steps.set-vars.outputs.image }}
    env:
      PROJECT_ID: quill-cloud-proxy
      REGION: us-central1
      REPO: trusted-router
      SERVICE: trusted-router
    steps:
      - uses: actions/checkout@v4

      - name: Set image ref from commit SHA
        id: set-vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "SHA=${SHA}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build image via Cloud Build
        # Use an explicit build config instead of `gcloud builds submit
        # --tag`: the shorthand forces Docker `--no-cache`, which made
        # every deploy reinstall Python dependencies from scratch. Pull
        # a registry-backed cache image, build with --cache-from, then
        # refresh the cache tag. The Dockerfile keeps dependency layers
        # ahead of app-code COPY so ordinary source changes reuse them.
        #
        # --async + poll instead of streaming logs. Streaming requires
        # project Viewer/Owner perms that we don't want to grant the
        # deploy SA (broader than needed). Async returns the build ID
        # which we then watch via `gcloud builds describe`.
        run: |
          set -euo pipefail
          CACHE_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:buildcache"
          cat > /tmp/cloudbuild-control-plane.yaml <<'EOF'
          steps:
            - name: gcr.io/cloud-builders/docker
              entrypoint: bash
              args:
                - -c
                - |
                  set -euo pipefail
                  docker pull "${_CACHE_IMAGE}" || true
                  docker build \
                    --network=cloudbuild \
                    --cache-from "${_CACHE_IMAGE}" \
                    --tag "${_IMAGE}" \
                    --tag "${_CACHE_IMAGE}" \
                    .
                  docker push "${_IMAGE}"
                  docker push "${_CACHE_IMAGE}"
          options:
            machineType: E2_HIGHCPU_8
          EOF
          BUILD_ID=$(gcloud builds submit \
            --config=/tmp/cloudbuild-control-plane.yaml \
            --substitutions="_IMAGE=${IMAGE},_CACHE_IMAGE=${CACHE_IMAGE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --async \
            --format='value(id)' \
            .)
          echo "build id: ${BUILD_ID}"
          while true; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" --region="${REGION}" \
              --format='value(status)')
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED) echo "build ${STATUS}"; exit 1 ;;
            esac
            sleep 5
          done

  migrate-schema:
    # Runs inside the same serialized deploy workflow, after CI and before any
    # serving revision changes. The script is idempotent; normally this is only
    # read-only INFORMATION_SCHEMA verification. A newly added column therefore
    # always exists before code that writes it can receive traffic.
    needs: [gate-on-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v3
      - name: Apply idempotent Spanner schema prerequisites
        env:
          GCP_PROJECT_ID: quill-cloud-proxy
          SPANNER_INSTANCE_ID: trusted-router-nam6
          SPANNER_DATABASE_ID: trusted-router
        run: scripts/deploy/migrate_typed_counters.sh

  deploy:
    needs: [gate-on-ci, build-image, migrate-schema]
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: quill-cloud-proxy
      REGION: us-central1
      REPO: trusted-router
      SERVICE: trusted-router
      SHA: ${{ needs.build-image.outputs.sha }}
      IMAGE: ${{ needs.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Push secrets to Secret Manager
        # secrets.sh is idempotent — only uploads when the local key file
        # has a value the GHA runner doesn't (it doesn't), so this is a
        # no-op for the runner. Left in for symmetry with local deploys.
        run: bash scripts/deploy/secrets.sh
        continue-on-error: true   # secrets are managed locally; runner has none

      # Staged regional deploy. Deploy us-central1 first, gate on a
      # 3-min single-region synthetic watch; only proceed to the
      # secondary warm regions if us-central1 stays up. A bad change
      # reaches at most one region before the secondaries start. Once
      # the primary canary is green, europe-west4 and us-east4 roll in
      # parallel with independent rollback. Final 10-min watch catches
      # issues that surface after warm regions are converged.
      #
      # Hotfix mode (workflow_dispatch input `hotfix: true`): the
      # watchdogs skip baseline + use --skip-baseline so a sick prod
      # doesn't block the fix that's intended to heal it. The staged
      # 10/50/100 traffic shift still applies — we just don't gate on
      # synthetics that are already failing.

      - name: Compute watchdog args (hotfix vs normal)
        id: wd_args
        run: |
          if [ "${{ inputs.hotfix }}" = "true" ]; then
            echo "extra=--skip-baseline --rollback-after 99 --baseline-grace-sec 0" >> "$GITHUB_OUTPUT"
            echo "::warning::HOTFIX MODE — watchdog gating disabled. Synthetic 'down' will not block this deploy."
          else
            echo "extra=" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture pre-deploy revisions (for rollback)
        id: prev
        run: |
          for region in us-central1 europe-west4 us-east4; do
            rev=$(gcloud run services describe "${SERVICE}" \
              --region="$region" --project="${PROJECT_ID}" \
              --format='value(status.traffic[0].revisionName)' \
              2>/dev/null || true)
            key="${region//-/_}_revision"
            echo "${key}=${rev}" >> "$GITHUB_OUTPUT"
            echo "  pre-deploy ${region}: ${rev:-<none>}"
          done

      - name: Detect optional deploy surfaces
        id: optional
        run: |
          set -euo pipefail
          deploy_synthetic_monitor="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.deploy_synthetic_monitor }}" = "true" ]; then
              deploy_synthetic_monitor="true"
            fi
          fi

          changed=""
          if [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before" || true
              changed="$(git diff --name-only "$before" "$GITHUB_SHA" 2>/dev/null || true)"
            fi
            if [ -z "$changed" ]; then
              changed="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)"
            fi
            # Any app source change can affect the synthetic monitor image; it
            # imports the same trusted_router package as the API service.
            if printf '%s\n' "$changed" | grep -Eq '^(src/trusted_router/|scripts/deploy/synthetic\.sh$|\.github/workflows/deploy\.yml$)'; then
              deploy_synthetic_monitor="true"
            fi
          fi

          echo "deploy_synthetic_monitor=${deploy_synthetic_monitor}" >> "$GITHUB_OUTPUT"
          echo "deploy_synthetic_monitor=${deploy_synthetic_monitor}"

      - name: Deploy us-central1 (no-traffic)
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.sha }}
          TR_DEPLOY_TARGET_REGIONS: us-central1
          TR_DEPLOY_NO_TRAFFIC: "1"
        run: bash scripts/deploy/rollout.sh

      - name: Resolve us-central1 new revision
        id: new_us
        run: |
          rev=$(gcloud run services describe "${SERVICE}" \
            --region=us-central1 --project="${PROJECT_ID}" \
            --format='value(status.latestCreatedRevisionName)')
          echo "revision=${rev}" >> "$GITHUB_OUTPUT"
          echo "  new us-central1 revision: ${rev}"

      - name: Stage traffic 10/50/100 (us-central1)
        # Ramps the new revision from 10% → 50% → 100% with a 1-min
        # synthetic watch between stages. On any watch trip, traffic
        # is reverted to 100% on the old revision and the workflow
        # fails before ever shipping anything to europe-west4.
        env:
          TR_WATCHDOG_SLO_CLASS: control_plane
        run: bash scripts/deploy/staged_traffic.sh us-central1 "${{ steps.new_us.outputs.revision }}" "${{ steps.prev.outputs.us_central1_revision }}"

      - name: Canary gate — watch us-central1 only (3 min)
        # Single-region 3-min canary. Down × 2 in a row trips it
        # (faster reaction than the final watch). europe-west4 hasn't
        # received the new image yet, so the bad change is contained.
        id: canary_us
        continue-on-error: true
        run: python3 scripts/deploy/watchdog.py --regions us-central1 --duration-min 3 --rollback-after 2 --slo-class control_plane ${{ steps.wd_args.outputs.extra }}

      - name: Rollback us-central1 + abort (canary tripped)
        if: ${{ steps.canary_us.outcome == 'failure' && steps.canary_us.outputs.rollback_regions != '' }}
        env:
          PREV_US: ${{ steps.prev.outputs.us_central1_revision }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_US}" ]; then
            echo "no prior us-central1 revision recorded; cannot rollback"
            exit 1
          fi
          echo "us-central1 canary failed; rolling traffic back to ${PREV_US}"
          gcloud run services update-traffic "${SERVICE}" \
            --region=us-central1 --project="${PROJECT_ID}" \
            --to-revisions="${PREV_US}=100" --quiet
          echo "europe-west4 NEVER received the bad image; safe."
          exit 1

      - name: Roll secondary warm regions in parallel (europe-west4 + us-east4)
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.sha }}
          PREV_EU: ${{ steps.prev.outputs.europe_west4_revision }}
          PREV_US_EAST4: ${{ steps.prev.outputs.us_east4_revision }}
          WD_EXTRA: ${{ steps.wd_args.outputs.extra }}
          TR_WATCHDOG_SLO_CLASS: control_plane
        run: |
          set -euo pipefail

          log_dir="$(mktemp -d)"
          echo "secondary rollout logs: ${log_dir}"

          previous_revision() {
            case "$1" in
              europe-west4) printf '%s\n' "${PREV_EU}" ;;
              us-east4) printf '%s\n' "${PREV_US_EAST4}" ;;
              *) return 1 ;;
            esac
          }

          rollback_region() {
            local region="$1"
            local previous
            previous="$(previous_revision "${region}")"
            if [ -z "${previous}" ]; then
              echo "no prior ${region} revision recorded; cannot rollback"
              return 1
            fi
            echo "${region} canary failed; rolling traffic back to ${previous}"
            gcloud run services update-traffic "${SERVICE}" \
              --region="${region}" --project="${PROJECT_ID}" \
              --to-revisions="${previous}=100" --quiet
          }

          deploy_secondary() {
            local region="$1"
            local previous
            previous="$(previous_revision "${region}")"
            echo "deploying ${region} no-traffic"
            TR_DEPLOY_TARGET_REGIONS="${region}" \
              TR_DEPLOY_NO_TRAFFIC="1" \
              IMAGE_TAG="${IMAGE_TAG}" \
              bash scripts/deploy/rollout.sh

            local revision
            revision="$(gcloud run services describe "${SERVICE}" \
              --region="${region}" --project="${PROJECT_ID}" \
              --format='value(status.latestCreatedRevisionName)')"
            echo "new ${region} revision: ${revision}"

            bash scripts/deploy/staged_traffic.sh "${region}" "${revision}" "${previous}"

            if ! python3 scripts/deploy/watchdog.py \
              --regions "${region}" \
              --duration-min 3 \
              --rollback-after 2 \
              --slo-class control_plane \
              ${WD_EXTRA}; then
              rollback_region "${region}"
              return 1
            fi
          }

          regions=(europe-west4 us-east4)
          pids=()
          for region in "${regions[@]}"; do
            (
              set -euo pipefail
              deploy_secondary "${region}"
            ) >"${log_dir}/${region}.log" 2>&1 &
            pids+=("$!")
          done

          failed=0
          for i in "${!regions[@]}"; do
            region="${regions[$i]}"
            pid="${pids[$i]}"
            if ! wait "${pid}"; then
              echo "::error::${region} rollout failed"
              failed=1
            fi
            echo "::group::${region} rollout log"
            cat "${log_dir}/${region}.log"
            echo "::endgroup::"
          done

          if [ "${failed}" -ne 0 ]; then
            echo "one or more secondary warm regions failed; us-central1 keeps the new release; cold regions have NOT received it."
            exit 1
          fi

      - name: Deploy cold regions (no canary, scale-to-zero)
        # Stage 3.5 cold region: southamerica-east1. min-instances=0
        # means ~$0/mo idle plus a ~5-10s cold-start tax on the first
        # request from that geography. Every region attached to the public
        # load balancer must run the same reader schema before a newer
        # synthetic monitor can write shared Bigtable rows. No canary is
        # needed because the warm regions already validated the image.
        # rollout.sh handles min-instances=0 automatically when a region is
        # in TR_CONTROL_PLANE_REGIONS but not TR_WARM_REGIONS.
        env:
          TR_DEPLOY_TARGET_REGIONS: southamerica-east1
        run: bash scripts/deploy/rollout.sh

      - name: Deploy synthetic monitor Cloud Run Job
        if: ${{ steps.optional.outputs.deploy_synthetic_monitor == 'true' }}
        # Re-deploys the synthetic monitor Cloud Run Job + Cloud Scheduler
        # cron with the latest image. Without this step, probe code or
        # cron-config (TR_SYNTHETIC_RUNS_PER_INVOCATION, monitor pool
        # ordering, etc.) changes ONLY land on the API service while the
        # cron job keeps running stale code — exactly what caused the
        # 06:00Z 2026-06-02 pong surge to persist after PR #14 + #15
        # "deployed".
        #
        # The script is idempotent and gracefully no-ops if the
        # synthetic monitor secret isn't present in this environment
        # (test, staging). Failure here does NOT block the API rollout
        # (continue-on-error) because synthetic monitoring is observability,
        # not user-serving traffic.
        continue-on-error: true
        run: bash scripts/deploy/synthetic.sh

      # No cross-region "final watchdog" step. Each region's health is
      # gated by its own per-region canary above (us-central1, then
      # europe-west4 + us-east4 in parallel, each with its own 3-min
      # watchdog AFTER the staged_traffic 10/50/100 ramp). The prior cross-
      # region watchdog at this point caused recurring spurious
      # rollbacks: by the time it ran, earlier regions had finished
      # converging but the just-deployed region was still settling,
      # so the watchdog window structurally overlapped one region's
      # settle phase and would auto-rollback it even when the deploy
      # was functionally clean. Same anti-pattern fixed in
      # quill-cloud-proxy commit 7b735e8.
      #
      # Cold region southamerica-east1 deploys after all warm-region
      # canaries pass. It has no per-region canary by design — warm
      # regions already validated the image, and the cold region is
      # lowest-volume by construction.

      - name: Smoke test prod
        run: |
          set -euo pipefail
          check_url() {
            local name="$1"
            local url="$2"
            local code
            code=$(curl -fsS --max-time 15 -o "/tmp/${name}.body" -w "%{http_code}" "$url") || {
              echo "${name} failed to fetch: ${url}"
              cat "/tmp/${name}.body" 2>/dev/null || true
              exit 1
            }
            [[ "$code" == "200" ]] || {
              echo "${name} returned ${code}: ${url}"
              cat "/tmp/${name}.body" 2>/dev/null || true
              exit 1
            }
          }

          check_url homepage https://trustedrouter.com/
          check_url health https://trustedrouter.com/health
          check_url regions https://trustedrouter.com/v1/regions
          check_url status_json https://trustedrouter.com/status.json
          check_url status_host https://status.trustedrouter.com/status.json

          # A global request can repeatedly land on a healthy warm region and
          # miss a stale cold revision. Exercise the shared-storage reader in
          # every load-balanced control-plane region directly.
          for region in us-central1 us-east4 europe-west4 southamerica-east1; do
            service_url=$(gcloud run services describe "${SERVICE}" \
              --project="${PROJECT_ID}" --region="${region}" \
              --format='value(status.url)')
            check_url "status_${region}" "${service_url}/status.json"
          done

          python3 - <<'PY'
          import json
          from pathlib import Path

          regions = json.loads(Path("/tmp/regions.body").read_text())["data"]
          status = json.loads(Path("/tmp/status_json.body").read_text())["data"]
          status_host = json.loads(Path("/tmp/status_host.body").read_text())["data"]

          assert any(item["id"] == "us-central1" for item in regions), regions
          assert any(item["id"] == "europe-west4" for item in regions), regions
          assert "components" in status, status.keys()
          assert status_host.get("current", {}).get("overall_status") or status_host.get("overall_status"), status_host.keys()
          PY

          count=$(curl -fsS --max-time 15 https://trustedrouter.com/v1/models \
            | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('data',[])))")
          [[ "$count" -gt 100 ]] || { echo "/v1/models has only $count models, expected >100"; exit 1; }
          echo "smoke ok: homepage, health, regions, status, and $count catalog models"
