# Auto-deploy the TrustedRouter control plane to Cloud Run on push to main.
#
# Trust posture: this is the *control plane* — billing, metadata, routing.
# It is NOT the attested-enclave trust boundary; that's the separate
# `deploy-enclave-gcp.yml` workflow in the quill-cloud-proxy repo.
# Failures here surface as "site is down" or "API key expired"; they do
# not affect prompt confidentiality, which the enclave guarantees.
#
# Auth: Workload Identity Federation. No JSON keys in GitHub Secrets.
# A short-lived OIDC token from GitHub is exchanged for an
# impersonation token on tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com,
# scoped to this repo + main branch only.
#
# Trigger: deploys ONLY when files that affect the running service change.
# Docs / README / unrelated config edits do not trigger a rollout.

name: Deploy TR control plane

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/deploy/**"
      - "frontend/src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Only one deploy at a time. Two pushes within seconds of each other
# serialize instead of racing to be the running revision.
concurrency:
  group: deploy-trusted-router
  cancel-in-progress: false

permissions:
  id-token: write   # for Workload Identity Federation
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: quill-cloud-proxy
      REGION: us-central1
      REPO: trusted-router
      SERVICE: trusted-router
    steps:
      - uses: actions/checkout@v4

      - name: Set image ref from commit SHA
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${SHA}"
          echo "SHA=${SHA}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image via Cloud Build
        # --async + poll instead of streaming logs. Streaming requires
        # project Viewer/Owner perms that we don't want to grant the
        # deploy SA (broader than needed). Async returns the build ID
        # which we then watch via `gcloud builds describe`.
        run: |
          set -euo pipefail
          BUILD_ID=$(gcloud builds submit \
            --tag "${IMAGE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --async \
            --format='value(id)' \
            .)
          echo "build id: ${BUILD_ID}"
          while true; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" --region="${REGION}" \
              --format='value(status)')
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED) echo "build ${STATUS}"; exit 1 ;;
            esac
            sleep 5
          done

      - name: Push secrets to Secret Manager
        # secrets.sh is idempotent — only uploads when the local key file
        # has a value the GHA runner doesn't (it doesn't), so this is a
        # no-op for the runner. Left in for symmetry with local deploys.
        run: bash scripts/deploy/secrets.sh
        continue-on-error: true   # secrets are managed locally; runner has none

      # Staged regional deploy. Deploy us-central1 first, gate on a
      # 3-min single-region synthetic watch; only proceed to
      # europe-west4 if us-central1 stays up. A bad change reaches at
      # most one region. Final 10-min watch catches issues that
      # surface after both regions are converged.

      - name: Capture pre-deploy revisions (for rollback)
        id: prev
        run: |
          for region in us-central1 europe-west4; do
            rev=$(gcloud run services describe "${SERVICE}" \
              --region="$region" --project="${PROJECT_ID}" \
              --format='value(status.traffic[0].revisionName)' \
              2>/dev/null || true)
            key="${region//-/_}_revision"
            echo "${key}=${rev}" >> "$GITHUB_OUTPUT"
            echo "  pre-deploy ${region}: ${rev:-<none>}"
          done

      - name: Deploy us-central1 (no-traffic)
        env:
          IMAGE_TAG: ${{ env.SHA }}
          TR_DEPLOY_TARGET_REGIONS: us-central1
          TR_DEPLOY_NO_TRAFFIC: "1"
        run: bash scripts/deploy/rollout.sh

      - name: Resolve us-central1 new revision
        id: new_us
        run: |
          rev=$(gcloud run services describe "${SERVICE}" \
            --region=us-central1 --project="${PROJECT_ID}" \
            --format='value(status.latestCreatedRevisionName)')
          echo "revision=${rev}" >> "$GITHUB_OUTPUT"
          echo "  new us-central1 revision: ${rev}"

      - name: Stage traffic 10/50/100 (us-central1)
        # Ramps the new revision from 10% → 50% → 100% with a 1-min
        # synthetic watch between stages. On any watch trip, traffic
        # is reverted to 100% on the old revision and the workflow
        # fails before ever shipping anything to europe-west4.
        run: bash scripts/deploy/staged_traffic.sh us-central1 "${{ steps.new_us.outputs.revision }}" "${{ steps.prev.outputs.us_central1_revision }}"

      - name: Canary gate — watch us-central1 only (3 min)
        # Single-region 3-min canary. Down × 2 in a row trips it
        # (faster reaction than the final watch). europe-west4 hasn't
        # received the new image yet, so the bad change is contained.
        id: canary_us
        continue-on-error: true
        run: python3 scripts/deploy/watchdog.py --regions us-central1 --duration-min 3 --rollback-after 2

      - name: Rollback us-central1 + abort (canary tripped)
        if: ${{ steps.canary_us.outcome == 'failure' && steps.canary_us.outputs.rollback_regions != '' }}
        env:
          PREV_US: ${{ steps.prev.outputs.us_central1_revision }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_US}" ]; then
            echo "no prior us-central1 revision recorded; cannot rollback"
            exit 1
          fi
          echo "us-central1 canary failed; rolling traffic back to ${PREV_US}"
          gcloud run services update-traffic "${SERVICE}" \
            --region=us-central1 --project="${PROJECT_ID}" \
            --to-revisions="${PREV_US}=100" --quiet
          echo "europe-west4 NEVER received the bad image; safe."
          exit 1

      - name: Deploy europe-west4 (no-traffic)
        env:
          IMAGE_TAG: ${{ env.SHA }}
          TR_DEPLOY_TARGET_REGIONS: europe-west4
          TR_DEPLOY_NO_TRAFFIC: "1"
        run: bash scripts/deploy/rollout.sh

      - name: Resolve europe-west4 new revision
        id: new_eu
        run: |
          rev=$(gcloud run services describe "${SERVICE}" \
            --region=europe-west4 --project="${PROJECT_ID}" \
            --format='value(status.latestCreatedRevisionName)')
          echo "revision=${rev}" >> "$GITHUB_OUTPUT"
          echo "  new europe-west4 revision: ${rev}"

      - name: Stage traffic 10/50/100 (europe-west4)
        run: bash scripts/deploy/staged_traffic.sh europe-west4 "${{ steps.new_eu.outputs.revision }}" "${{ steps.prev.outputs.europe_west4_revision }}"

      - name: Canary gate — watch europe-west4 only (3 min)
        id: canary_eu
        continue-on-error: true
        run: python3 scripts/deploy/watchdog.py --regions europe-west4 --duration-min 3 --rollback-after 2

      - name: Rollback europe-west4 + abort (canary tripped)
        if: ${{ steps.canary_eu.outcome == 'failure' && steps.canary_eu.outputs.rollback_regions != '' }}
        env:
          PREV_EU: ${{ steps.prev.outputs.europe_west4_revision }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_EU}" ]; then
            echo "no prior europe-west4 revision recorded; cannot rollback"
            exit 1
          fi
          echo "europe-west4 canary failed; rolling traffic back to ${PREV_EU}"
          gcloud run services update-traffic "${SERVICE}" \
            --region=europe-west4 --project="${PROJECT_ID}" \
            --to-revisions="${PREV_EU}=100" --quiet
          echo "us-central1 keeps the new release."
          exit 1

      - name: Deploy cold regions (no canary, parallel, scale-to-zero)
        # Stage 3.5 cold regions: asia-northeast1, asia-southeast1,
        # southamerica-east1. min-instances=0 means ~$0/mo idle plus
        # a ~5-10s cold-start tax on the first request from those
        # geographies. No canary because (a) they're lowest-volume by
        # construction and (b) the warm regions already validated the
        # image. rollout.sh handles min-instances=0 automatically when
        # a region is in TR_REGIONS but not TR_WARM_REGIONS.
        env:
          TR_DEPLOY_TARGET_REGIONS: asia-northeast1,asia-southeast1,southamerica-east1
        run: bash scripts/deploy/rollout.sh

      - name: Final watchdog — both regions (10 min)
        # Catches issues that surface after both regions are
        # converged but before the deploy is "done." Per-region:
        # only the failing region(s) get rolled back. Cold regions
        # don't have synthetics on them yet, so the watchdog stays
        # focused on warm regions.
        id: watchdog
        continue-on-error: true
        run: python3 scripts/deploy/watchdog.py --duration-min 10 --rollback-after 3

      - name: Rollback (per-region, only failing ones)
        if: ${{ steps.watchdog.outcome == 'failure' && steps.watchdog.outputs.rollback_regions != '' }}
        env:
          ROLLBACK_REGIONS: ${{ steps.watchdog.outputs.rollback_regions }}
          PREV_US: ${{ steps.prev.outputs.us_central1_revision }}
          PREV_EU: ${{ steps.prev.outputs.europe_west4_revision }}
        run: |
          set -euo pipefail
          IFS=',' read -ra REGIONS <<< "${ROLLBACK_REGIONS}"
          for region in "${REGIONS[@]}"; do
            case "$region" in
              us-central1) prev="${PREV_US}" ;;
              europe-west4) prev="${PREV_EU}" ;;
              *) echo "  ${region}: no rollback handle; skipping"; continue ;;
            esac
            if [ -z "$prev" ]; then
              echo "  ${region}: no prior revision recorded; skipping"
              continue
            fi
            echo "  ${region}: rolling traffic back to ${prev}"
            gcloud run services update-traffic "${SERVICE}" \
              --region="$region" --project="${PROJECT_ID}" \
              --to-revisions="${prev}=100" --quiet
          done
          echo "rollback complete for: ${ROLLBACK_REGIONS}; failing job so the bad release shows red in GHA"
          exit 1

      - name: Smoke test prod
        run: |
          set -e
          # Homepage is unauthenticated — always test it.
          code=$(curl -s -o /dev/null -w "%{http_code}" https://trustedrouter.com/)
          [[ "$code" == "200" ]] || { echo "homepage returned $code"; exit 1; }
          # /v1/models requires an API key; only run that check when a
          # SMOKE_TEST_API_KEY secret is configured. Missing secret =>
          # smoke test passes on homepage alone.
          if [ -n "${{ secrets.SMOKE_TEST_API_KEY }}" ]; then
            count=$(curl -sH "authorization: Bearer ${{ secrets.SMOKE_TEST_API_KEY }}" \
              https://trustedrouter.com/v1/models | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('data',[])))")
            [[ "$count" -gt 100 ]] || { echo "/v1/models has only $count models, expected >100"; exit 1; }
            echo "smoke ok: homepage 200, $count models in catalog"
          else
            echo "smoke ok: homepage 200 (skipped /v1/models — SMOKE_TEST_API_KEY not configured)"
          fi
